upstream control_plane {
    server control-plane:8000;
}

upstream dashboard_pool {
    server dashboard-1:8000;
    server dashboard-2:8000;
}

map $request_method $checks_backend {
    default http://control_plane;
    GET http://dashboard_pool;
    HEAD http://dashboard_pool;
}

server {
    listen 8080;
    server_name _;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    location = / {
        proxy_pass http://dashboard_pool;
    }

    location /dashboards {
        proxy_pass http://dashboard_pool;
    }

    location /app.js {
        proxy_pass http://dashboard_pool;
    }

    location /app.css {
        proxy_pass http://dashboard_pool;
    }

    location = /api/overview {
        proxy_pass http://dashboard_pool;
    }

    location = /api/results {
        proxy_pass http://dashboard_pool;
    }

    location /api/metrics/ {
        proxy_pass http://dashboard_pool;
    }

    location = /api/checks {
        proxy_pass $checks_backend;
    }

    location ~ ^/api/checks/[^/]+$ {
        proxy_pass $checks_backend;
    }

    location /api/ {
        proxy_pass http://control_plane;
    }

    location / {
        proxy_pass http://control_plane;
    }
}
