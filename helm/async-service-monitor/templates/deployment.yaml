apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "async-service-monitor.fullname" . }}
  labels:
    {{- include "async-service-monitor.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.deployment.replicas }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "async-service-monitor.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "async-service-monitor.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "async-service-monitor.serviceAccountName" . }}
      terminationGracePeriodSeconds: {{ .Values.deployment.terminationGracePeriodSeconds }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: async-service-monitor
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --config
            - {{ .Values.config.mountPath }}
            - --host
            - 0.0.0.0
            - --port
            - "{{ .Values.service.targetPort }}"
          env:
            - name: PYTHONUNBUFFERED
              value: {{ .Values.env.pythonUnbuffered | quote }}
            {{- if .Values.env.configPassphrase.existingSecret }}
            - name: ASM_CONFIG_PASSPHRASE
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.env.configPassphrase.existingSecret }}
                  key: {{ .Values.env.configPassphrase.key }}
                  optional: true
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          startupProbe:
            httpGet:
              path: {{ .Values.probes.startup.path }}
              port: http
            periodSeconds: {{ .Values.probes.startup.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.startup.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.startup.failureThreshold }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: app-config
              mountPath: {{ .Values.config.mountPath }}
              subPath: {{ .Values.config.fileName }}
              readOnly: true
      volumes:
        - name: app-config
          configMap:
            name: {{ include "async-service-monitor.fullname" . }}-config
