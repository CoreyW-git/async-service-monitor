nameOverride: ""
fullnameOverride: ""

image:
  repository: async-service-monitor
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets: []

podAnnotations: {}

serviceAccount:
  create: false
  annotations: {}
  name: ""

deployment:
  replicas: 1
  terminationGracePeriodSeconds: 30

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi

service:
  type: ClusterIP
  port: 80
  targetPort: 8000
  appProtocol: http
  loadBalancerClass: ""
  annotations: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: async-service-monitor.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

probes:
  readiness:
    path: /readyz
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6
  liveness:
    path: /livez
    initialDelaySeconds: 20
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 3
  startup:
    path: /healthz
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 18

podDisruptionBudget:
  enabled: true
  minAvailable: 1

env:
  pythonUnbuffered: "1"
  configPassphrase:
    existingSecret: async-service-monitor-secrets
    key: ASM_CONFIG_PASSPHRASE

config:
  mountPath: /app/config.yaml
  fileName: config.kubernetes.yaml
  content: |
    defaults:
      timeout_seconds: 10
      user_agent: async-service-monitor/0.1.0
      peer_timeout_seconds: 3
      peer_poll_interval_seconds: 15
      recovery_cooldown_seconds: 300
      bind_host: 0.0.0.0
      bind_port: 8080

    cluster:
      enabled: false
      node_id: monitor-k8s-1

    notifications:
      email:
        enabled: false
        provider: custom
        port: 587
        subject_prefix: "[async-service-monitor]"
        use_tls: true
        use_ssl: false

    telemetry:
      enabled: false
      timeseries_provider: local_postgresql
      timeseries_port: 5432
      timeseries_local_container_name: async-service-monitor-postgres
      object_provider: local_minio
      object_bucket: async-service-monitor
      object_console_port: 9001
      object_local_container_name: async-service-monitor-minio
      retention_hours: 2
      timeseries_use_ssl: false
      object_use_ssl: false
      auto_provision_timeseries_local: false
      auto_provision_object_local: false

    portal:
      enabled: true
      provider: basic
      realm: Service Health Portal
      users: []
      oci:
        enabled: false

    checks: []

cloud:
  provider: generic

providers:
  oke:
    service:
      type: LoadBalancer
      annotations:
        oci.oraclecloud.com/load-balancer-type: "lb"
        service.beta.kubernetes.io/oci-load-balancer-shape: "flexible"
        service.beta.kubernetes.io/oci-load-balancer-shape-flex-min: "10"
        service.beta.kubernetes.io/oci-load-balancer-shape-flex-max: "100"
  eks:
    service:
      type: LoadBalancer
      loadBalancerClass: eks.amazonaws.com/nlb
      annotations:
        service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
        service.beta.kubernetes.io/aws-load-balancer-healthcheck-protocol: HTTP
        service.beta.kubernetes.io/aws-load-balancer-healthcheck-path: /healthz
        service.beta.kubernetes.io/aws-load-balancer-healthcheck-port: traffic-port
  aks:
    service:
      type: LoadBalancer
      annotations:
        service.beta.kubernetes.io/azure-load-balancer-health-probe-request-path: /healthz
