<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Async Service Monitor</title>
    <link rel="stylesheet" href="/app.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand-block">
          <p class="eyebrow">Admin Portal</p>
          <h1>Service Health Portal</h1>
          <p class="sidebar-copy">Monitor Service Health & Custom Endpoints</p>
        </div>

        <nav class="sidebar-nav">
          <a href="/" data-link>Home</a>
          <a href="/dashboards" data-link data-role-min="read_only">Dashboards</a>
          <a href="/apm" data-link data-role-min="read_only">Application Performance Management</a>
          <a href="/monitors" data-link data-role-min="read_only">Monitors</a>
          <a href="/admin" data-link data-role-min="admin">Administration</a>
          <a href="/guide" data-link>Help</a>
        </nav>

        <div id="session-chip" class="session-chip hidden"></div>
      </aside>

      <main class="workspace">
        <header class="workspace-hero">
          <div>
            <nav id="workspace-breadcrumbs" class="workspace-breadcrumbs"></nav>
            <p class="eyebrow">Status</p>
            <h2 id="workspace-title">Home</h2>
            <p id="workspace-subtitle" class="workspace-copy">Healthy, unhealthy, and disabled endpoint monitors at a glance.</p>
          </div>
          <div class="hero-metrics" id="overview-cards"></div>
        </header>

        <div id="app-root"></div>
      </main>
    </div>
    <script src="/vendor/plotly.min.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
