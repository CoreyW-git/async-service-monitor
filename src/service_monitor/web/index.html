<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Async Service Monitor</title>
    <link rel="stylesheet" href="/app.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand-block">
          <p class="eyebrow">Admin Portal</p>
          <h1>Service Health Portal</h1>
          <p class="sidebar-copy">Monitor Service Health & Custom Endpoints</p>
        </div>

        <nav class="sidebar-nav">
          <a href="/guide" data-link>FAQ</a>
          <a href="/" data-link>Dashboard</a>
          <a href="/monitors/new" data-link data-role-min="read_write">Add Monitor</a>
          <a href="/configured-monitors" data-link data-role-min="read_write">Configured Monitors</a>
          <button type="button" id="cluster-toggle" class="sidebar-toggle hidden" data-role-min="admin">
            <span>Cluster</span>
            <span id="cluster-chevron">+</span>
          </button>
          <section class="sidebar-section hidden" id="cluster-section">
            <div class="sidebar-monitors">
              <a href="/cluster/configure" id="configure-containers-link" class="sidebar-link" data-link>Configure Containers</a>
              <div id="sidebar-cluster-containers" class="sidebar-monitors"></div>
            </div>
          </section>
          <a href="/admin" data-link data-role-min="admin">Administration</a>
        </nav>

        <div id="session-chip" class="session-chip hidden"></div>
      </aside>

      <main class="workspace">
        <header class="workspace-hero">
          <div>
            <p class="eyebrow">Status</p>
            <h2 id="workspace-title">Dashboard</h2>
            <p id="workspace-subtitle" class="workspace-copy">Healthy, unhealthy, and disabled endpoint monitors at a glance.</p>
          </div>
          <div class="hero-metrics" id="overview-cards"></div>
        </header>

        <div id="app-root"></div>
      </main>
    </div>
    <script src="/app.js"></script>
  </body>
</html>
