<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Service Health Portal Architecture Overview</title>
  <desc id="desc">An architecture overview diagram showing the portal, configuration, runner, monitors, dashboards, and telemetry stores.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f7f8ff"/>
      <stop offset="100%" stop-color="#eef6ff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#1f2937" flood-opacity="0.18"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2f4f80"/>
    </marker>
  </defs>
  <rect width="1280" height="720" rx="28" fill="url(#bg)"/>
  <text x="72" y="78" font-size="34" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f172a">Service Health Portal Architecture</text>
  <text x="72" y="112" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#475569">Portal operators change config, the runner executes checks, and dashboards read live plus retained telemetry.</text>

  <g filter="url(#shadow)">
    <rect x="74" y="170" width="250" height="128" rx="24" fill="#ffffff"/>
    <rect x="74" y="170" width="250" height="128" rx="24" fill="none" stroke="#d8e3f0"/>
    <rect x="98" y="196" width="48" height="48" rx="14" fill="url(#accent)"/>
    <text x="164" y="224" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f172a">Admin Portal</text>
    <text x="98" y="266" font-size="16" font-family="Segoe UI, Arial, sans-serif" fill="#475569">Home, Dashboards, Monitors,</text>
    <text x="98" y="288" font-size="16" font-family="Segoe UI, Arial, sans-serif" fill="#475569">Cluster, Administration, Help</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="380" y="170" width="250" height="128" rx="24" fill="#ffffff"/>
    <rect x="380" y="170" width="250" height="128" rx="24" fill="none" stroke="#d8e3f0"/>
    <rect x="404" y="196" width="48" height="48" rx="14" fill="#1d4ed8"/>
    <text x="470" y="224" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f172a">Config Store</text>
    <text x="404" y="266" font-size="16" font-family="Segoe UI, Arial, sans-serif" fill="#475569">Monitor definitions, users,</text>
    <text x="404" y="288" font-size="16" font-family="Segoe UI, Arial, sans-serif" fill="#475569">service settings, secrets</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="686" y="170" width="250" height="128" rx="24" fill="#ffffff"/>
    <rect x="686" y="170" width="250" height="128" rx="24" fill="none" stroke="#d8e3f0"/>
    <rect x="710" y="196" width="48" height="48" rx="14" fill="#0f766e"/>
    <text x="776" y="224" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f172a">Monitor Runner</text>
    <text x="710" y="266" font-size="16" font-family="Segoe UI, Arial, sans-serif" fill="#475569">Schedules async checks, cluster</text>
    <text x="710" y="288" font-size="16" font-family="Segoe UI, Arial, sans-serif" fill="#475569">ownership, failover, notifications</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="992" y="170" width="214" height="128" rx="24" fill="#ffffff"/>
    <rect x="992" y="170" width="214" height="128" rx="24" fill="none" stroke="#d8e3f0"/>
    <rect x="1016" y="196" width="48" height="48" rx="14" fill="#7c3aed"/>
    <text x="1082" y="224" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f172a">Targets</text>
    <text x="1016" y="266" font-size="16" font-family="Segoe UI, Arial, sans-serif" fill="#475569">HTTP, DNS, Auth, Database,</text>
    <text x="1016" y="288" font-size="16" font-family="Segoe UI, Arial, sans-serif" fill="#475569">Generic, Browser journeys</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="230" y="410" width="320" height="180" rx="26" fill="#ffffff"/>
    <rect x="230" y="410" width="320" height="180" rx="26" fill="none" stroke="#d8e3f0"/>
    <text x="258" y="452" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f172a">Live Portal State</text>
    <text x="258" y="486" font-size="17" font-family="Segoe UI, Arial, sans-serif" fill="#475569">In-memory telemetry powers Home,</text>
    <text x="258" y="510" font-size="17" font-family="Segoe UI, Arial, sans-serif" fill="#475569">APM-style dashboards, recent results,</text>
    <text x="258" y="534" font-size="17" font-family="Segoe UI, Arial, sans-serif" fill="#475569">incident timelines, and diagnostics.</text>
    <rect x="258" y="552" width="124" height="18" rx="9" fill="#dbeafe"/>
    <rect x="392" y="552" width="96" height="18" rx="9" fill="#dcfce7"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="640" y="410" width="430" height="180" rx="26" fill="#ffffff"/>
    <rect x="640" y="410" width="430" height="180" rx="26" fill="none" stroke="#d8e3f0"/>
    <text x="668" y="452" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f172a">Retained Telemetry Layer</text>
    <text x="668" y="486" font-size="17" font-family="Segoe UI, Arial, sans-serif" fill="#475569">Time-series metrics persist in PostgreSQL.</text>
    <text x="668" y="510" font-size="17" font-family="Segoe UI, Arial, sans-serif" fill="#475569">Rich run diagnostics, snapshots, and future artifacts</text>
    <text x="668" y="534" font-size="17" font-family="Segoe UI, Arial, sans-serif" fill="#475569">persist in MinIO now and OCI Object Storage later.</text>
    <rect x="668" y="550" width="170" height="28" rx="14" fill="#e0f2fe"/>
    <text x="691" y="570" font-size="15" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#0369a1">PostgreSQL Time Series</text>
    <rect x="852" y="550" width="176" height="28" rx="14" fill="#ede9fe"/>
    <text x="891" y="570" font-size="15" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#6d28d9">MinIO / OCI Objects</text>
  </g>

  <path d="M324 234 H380" stroke="#2f4f80" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M630 234 H686" stroke="#2f4f80" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M936 234 H992" stroke="#2f4f80" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M812 298 V410" stroke="#2f4f80" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M752 298 C752 362, 542 362, 390 410" stroke="#2f4f80" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M550 500 H640" stroke="#2f4f80" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
</svg>
