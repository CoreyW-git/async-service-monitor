<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Monitor Lifecycle Diagram</title>
  <desc id="desc">A diagram showing how monitors are created, assigned, executed, analyzed, and tuned.</desc>
  <defs>
    <linearGradient id="bg2" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#fffdf8"/>
      <stop offset="100%" stop-color="#f5f9ff"/>
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#111827" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#4b5563"/>
    </marker>
  </defs>
  <rect width="1280" height="720" rx="28" fill="url(#bg2)"/>
  <text x="72" y="82" font-size="34" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#111827">Monitor Lifecycle</text>
  <text x="72" y="118" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#475569">How new monitors move from configuration to execution, observability, and continuous tuning.</text>

  <g filter="url(#shadow2)">
    <rect x="84" y="190" width="180" height="112" rx="24" fill="#ffffff" stroke="#e5e7eb"/>
    <text x="120" y="235" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#111827">Create</text>
    <text x="108" y="266" font-size="16" font-family="Segoe UI, Arial, sans-serif" fill="#475569">Basic, browser,</text>
    <text x="104" y="288" font-size="16" font-family="Segoe UI, Arial, sans-serif" fill="#475569">or recorded monitor</text>
  </g>
  <g filter="url(#shadow2)">
    <rect x="320" y="190" width="180" height="112" rx="24" fill="#ffffff" stroke="#e5e7eb"/>
    <text x="350" y="235" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#111827">Place</text>
    <text x="344" y="266" font-size="16" font-family="Segoe UI, Arial, sans-serif" fill="#475569">Auto-balance or pin</text>
    <text x="352" y="288" font-size="16" font-family="Segoe UI, Arial, sans-serif" fill="#475569">to a node</text>
  </g>
  <g filter="url(#shadow2)">
    <rect x="556" y="190" width="180" height="112" rx="24" fill="#ffffff" stroke="#e5e7eb"/>
    <text x="583" y="235" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#111827">Execute</text>
    <text x="586" y="266" font-size="16" font-family="Segoe UI, Arial, sans-serif" fill="#475569">Async schedule, auth,</text>
    <text x="595" y="288" font-size="16" font-family="Segoe UI, Arial, sans-serif" fill="#475569">validation, retries</text>
  </g>
  <g filter="url(#shadow2)">
    <rect x="792" y="190" width="180" height="112" rx="24" fill="#ffffff" stroke="#e5e7eb"/>
    <text x="815" y="235" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#111827">Observe</text>
    <text x="812" y="266" font-size="16" font-family="Segoe UI, Arial, sans-serif" fill="#475569">Home, dashboards,</text>
    <text x="815" y="288" font-size="16" font-family="Segoe UI, Arial, sans-serif" fill="#475569">golden signals, HAR</text>
  </g>
  <g filter="url(#shadow2)">
    <rect x="1028" y="190" width="180" height="112" rx="24" fill="#ffffff" stroke="#e5e7eb"/>
    <text x="1055" y="235" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#111827">Tune</text>
    <text x="1054" y="266" font-size="16" font-family="Segoe UI, Arial, sans-serif" fill="#475569">Edit thresholds, auth,</text>
    <text x="1050" y="288" font-size="16" font-family="Segoe UI, Arial, sans-serif" fill="#475569">journeys, placement</text>
  </g>

  <path d="M264 246 H320" stroke="#4b5563" stroke-width="4" fill="none" marker-end="url(#arrow2)"/>
  <path d="M500 246 H556" stroke="#4b5563" stroke-width="4" fill="none" marker-end="url(#arrow2)"/>
  <path d="M736 246 H792" stroke="#4b5563" stroke-width="4" fill="none" marker-end="url(#arrow2)"/>
  <path d="M972 246 H1028" stroke="#4b5563" stroke-width="4" fill="none" marker-end="url(#arrow2)"/>

  <g filter="url(#shadow2)">
    <rect x="168" y="414" width="944" height="206" rx="28" fill="#ffffff" stroke="#dbe4f0"/>
    <text x="208" y="462" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#111827">What operators adjust over time</text>
    <text x="208" y="502" font-size="17" font-family="Segoe UI, Arial, sans-serif" fill="#475569">Monitors do not stop at “pass or fail.” Operators iterate on placement, alert thresholds, expected content, and authentication.</text>
    <rect x="208" y="534" width="208" height="34" rx="17" fill="#dcfce7"/>
    <text x="236" y="556" font-size="16" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#166534">Latency and SLO thresholds</text>
    <rect x="432" y="534" width="184" height="34" rx="17" fill="#dbeafe"/>
    <text x="464" y="556" font-size="16" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#1d4ed8">Expected content rules</text>
    <rect x="632" y="534" width="170" height="34" rx="17" fill="#ede9fe"/>
    <text x="674" y="556" font-size="16" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#6d28d9">Auth/session reuse</text>
    <rect x="818" y="534" width="182" height="34" rx="17" fill="#ffedd5"/>
    <text x="848" y="556" font-size="16" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#c2410c">Cluster node placement</text>
  </g>

  <path d="M1118 302 C1118 360, 980 370, 900 414" stroke="#4b5563" stroke-width="4" fill="none" marker-end="url(#arrow2)"/>
</svg>
