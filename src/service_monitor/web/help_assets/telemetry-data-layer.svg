<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Telemetry Data Layer Diagram</title>
  <desc id="desc">A diagram showing how monitor runs emit time series to PostgreSQL and rich diagnostics to object storage.</desc>
  <defs>
    <linearGradient id="bg3" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#fbf7ff"/>
    </linearGradient>
    <filter id="shadow3" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#1f2937" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow3" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="1280" height="720" rx="28" fill="url(#bg3)"/>
  <text x="72" y="82" font-size="34" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#111827">Telemetry Data Layer</text>
  <text x="72" y="118" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#475569">Time-series and richer diagnostics are separated so the portal can scale its data path cleanly.</text>

  <g filter="url(#shadow3)">
    <rect x="102" y="214" width="248" height="130" rx="24" fill="#ffffff" stroke="#d8e3f0"/>
    <text x="136" y="252" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#111827">Monitor Run</text>
    <text x="136" y="286" font-size="16" font-family="Segoe UI, Arial, sans-serif" fill="#475569">Availability, duration, status,</text>
    <text x="136" y="308" font-size="16" font-family="Segoe UI, Arial, sans-serif" fill="#475569">error count, step details, HAR-like data</text>
  </g>

  <g filter="url(#shadow3)">
    <rect x="432" y="164" width="320" height="182" rx="28" fill="#ffffff" stroke="#d8e3f0"/>
    <text x="466" y="206" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#111827">Runner + Telemetry Store</text>
    <text x="466" y="242" font-size="16" font-family="Segoe UI, Arial, sans-serif" fill="#475569">Splits hot metrics from heavier diagnostics.</text>
    <rect x="466" y="270" width="122" height="28" rx="14" fill="#dbeafe"/>
    <text x="492" y="289" font-size="15" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#1d4ed8">Live state</text>
    <rect x="602" y="270" width="132" height="28" rx="14" fill="#ede9fe"/>
    <text x="623" y="289" font-size="15" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#6d28d9">Retention</text>
    <text x="466" y="328" font-size="16" font-family="Segoe UI, Arial, sans-serif" fill="#475569">Retention hours control how long both metric rows</text>
    <text x="466" y="350" font-size="16" font-family="Segoe UI, Arial, sans-serif" fill="#475569">and rich diagnostics remain available for dashboards.</text>
  </g>

  <g filter="url(#shadow3)">
    <rect x="832" y="146" width="320" height="154" rx="28" fill="#ffffff" stroke="#d8e3f0"/>
    <text x="868" y="188" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#111827">PostgreSQL</text>
    <text x="868" y="224" font-size="16" font-family="Segoe UI, Arial, sans-serif" fill="#475569">Availability, latency, percentile, node,</text>
    <text x="868" y="246" font-size="16" font-family="Segoe UI, Arial, sans-serif" fill="#475569">and error-event time series for dashboards</text>
  </g>

  <g filter="url(#shadow3)">
    <rect x="832" y="366" width="320" height="190" rx="28" fill="#ffffff" stroke="#d8e3f0"/>
    <text x="868" y="408" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#111827">MinIO / OCI Object Storage</text>
    <text x="868" y="444" font-size="16" font-family="Segoe UI, Arial, sans-serif" fill="#475569">Session diagnostics, browser network traces,</text>
    <text x="868" y="466" font-size="16" font-family="Segoe UI, Arial, sans-serif" fill="#475569">config snapshots, and future rich artifacts</text>
    <text x="868" y="500" font-size="16" font-family="Segoe UI, Arial, sans-serif" fill="#475569">This keeps large troubleshooting data out of the</text>
    <text x="868" y="522" font-size="16" font-family="Segoe UI, Arial, sans-serif" fill="#475569">time-series path and makes cloud migration easier.</text>
  </g>

  <g filter="url(#shadow3)">
    <rect x="326" y="460" width="356" height="118" rx="24" fill="#ffffff" stroke="#d8e3f0"/>
    <text x="360" y="500" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#111827">Dashboards and Help</text>
    <text x="360" y="536" font-size="16" font-family="Segoe UI, Arial, sans-serif" fill="#475569">Read current state first, then historical telemetry</text>
    <text x="360" y="558" font-size="16" font-family="Segoe UI, Arial, sans-serif" fill="#475569">for APM-style trends and deep troubleshooting.</text>
  </g>

  <path d="M350 278 H432" stroke="#334155" stroke-width="4" fill="none" marker-end="url(#arrow3)"/>
  <path d="M752 222 H832" stroke="#334155" stroke-width="4" fill="none" marker-end="url(#arrow3)"/>
  <path d="M752 300 C812 328, 812 396, 832 420" stroke="#334155" stroke-width="4" fill="none" marker-end="url(#arrow3)"/>
  <path d="M548 346 V460" stroke="#334155" stroke-width="4" fill="none" marker-end="url(#arrow3)"/>
  <path d="M832 462 H682" stroke="#334155" stroke-width="4" fill="none" marker-end="url(#arrow3)"/>
</svg>
