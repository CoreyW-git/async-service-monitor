defaults:
  timeout_seconds: 10.0
  user_agent: async-service-monitor/0.1.0
  peer_timeout_seconds: 3.0
  peer_poll_interval_seconds: 15.0
  recovery_cooldown_seconds: 300.0
  bind_host: 0.0.0.0
  bind_port: 8080
  metrics_history_limit: 120
cluster:
  enabled: true
  node_id: monitor-1
  bind_host: 0.0.0.0
  bind_port: 8080
notifications:
  email:
    enabled: false
    provider: custom
    port: 587
    subject_prefix: '[async-service-monitor]'
    use_tls: true
    use_ssl: false
    auto_provision_local: false
    local_container_name: async-service-monitor-mailpit
    local_ui_port: 8025
telemetry:
  enabled: false
  provider: local_mysql
  port: 3306
  retention_hours: 2
  use_ssl: false
  auto_provision_local: false
  local_container_name: async-service-monitor-mysql
portal:
  enabled: true
  provider: basic
  realm: Async Service Monitor
  users: []
  oci:
    enabled: false
checks:
- name: yahoo-http
  type: http
  interval_seconds: 300.0
  enabled: false
  placement_mode: auto
  timeout_seconds: 10.0
  url: https://www.yahoo.com
  database_engine: mysql
  expected_statuses:
  - 200
  expect_authenticated_statuses:
  - 200
  content:
    contains:
    - Yahoo
    - news
  unauthenticated_probe:
    enabled: false
    expect_statuses:
    - 401
    - 403
- name: yahoo-dns
  type: dns
  interval_seconds: 300.0
  enabled: true
  placement_mode: auto
  timeout_seconds: 10.0
  host: www.yahoo.com
  database_engine: mysql
  expected_statuses:
  - 200
  expect_authenticated_statuses:
  - 200
  unauthenticated_probe:
    enabled: false
    expect_statuses:
    - 401
    - 403
- name: Google Monitor
  type: http
  interval_seconds: 300.0
  enabled: true
  placement_mode: auto
  timeout_seconds: 10.0
  url: https://www.google.com
  database_engine: mysql
  expected_statuses:
  - 200
  expect_authenticated_statuses:
  - 200
  unauthenticated_probe:
    enabled: false
    expect_statuses:
    - 401
    - 403
_encryption:
  version: 1
  kdf: pbkdf2_sha256
  iterations: 390000
  salt: AsdS3PvS4rosIn-Y4BXtRg==
