defaults:
  timeout_seconds: 10.0
  user_agent: async-service-monitor/0.1.0
  peer_timeout_seconds: 3.0
  peer_poll_interval_seconds: 15.0
  recovery_cooldown_seconds: 300.0
  bind_host: 0.0.0.0
  bind_port: 8080
  metrics_history_limit: 120
cluster:
  enabled: true
  node_id: monitor-1
  bind_host: 0.0.0.0
  bind_port: 8080
notifications:
  email:
    enabled: false
    provider: custom
    port: 587
    subject_prefix: '[async-service-monitor]'
    use_tls: true
    use_ssl: false
    auto_provision_local: false
    local_container_name: async-service-monitor-mailpit
    local_ui_port: 8025
telemetry:
  enabled: false
  provider: local_mysql
  port: 3306
  retention_hours: 2
  use_ssl: false
  auto_provision_local: false
  local_container_name: async-service-monitor-mysql
portal:
  enabled: true
  provider: basic
  realm: Async Service Monitor
  users:
  - username: enc::gAAAAABpwaiBQf7lcUoaXfMyhJPHAlteok9UtbtqDd4Xf8Hi1fqiuTCvqn5dQGOI57e6XwA-vmafRdBhi8iOAih2zxbisUxGvA==
    password: enc::gAAAAABpwaiBgSAUhpkCkpymcL6_TpJ7Ibqoj34SKn8Ms5lEbRuBAdfVdcYxA1HC4tVh-fGhYXc7VOaMYX4IUcUk2NR2wnx-5w==
    first_name: Corey
