checks:
- name: yahoo-http
  type: http
  interval_seconds: 300.0
  enabled: false
  placement_mode: auto
  timeout_seconds: 10.0
  url: https://www.yahoo.com
  database_engine: mysql
  expected_statuses:
  - 200
  expect_authenticated_statuses:
  - 200
  content:
    contains:
    - Yahoo
    - news
  unauthenticated_probe:
    enabled: false
    expect_statuses:
    - 401
    - 403
- name: yahoo-dns
  type: dns
  interval_seconds: 300.0
  enabled: true
  placement_mode: auto
  timeout_seconds: 10.0
  host: www.yahoo.com
  database_engine: mysql
  expected_statuses:
  - 200
  expect_authenticated_statuses:
  - 200
  unauthenticated_probe:
    enabled: false
    expect_statuses:
    - 401
    - 403
- name: Google Monitor
  type: http
  interval_seconds: 300.0
  enabled: true
  placement_mode: auto
  timeout_seconds: 10.0
  url: https://www.google.com
  database_engine: mysql
  expected_statuses:
  - 200
  expect_authenticated_statuses:
  - 200
  unauthenticated_probe:
    enabled: false
    expect_statuses:
    - 401
    - 403
